<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recollectium WebUI</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Recollectium Core</p>
        <h1>Recollectium WebUI</h1>
        <p class="lede">
          A local-first, packaged WebUI shell for the Recollectium Core service.
        </p>
        <div class="status-card">
          <p><strong>Health</strong>: <span id="health-status">loading…</span></p>
          <p><strong>Status</strong>: <span id="service-status">loading…</span></p>
          <p><strong>Security</strong>: <span id="security-status">loading…</span></p>
        </div>
      </section>

      <section class="panel">
        <h2>Capabilities</h2>
        <pre id="capabilities">loading…</pre>
      </section>

      <section class="panel">
        <h2>Endpoint snapshot</h2>
        <pre id="endpoint-snapshot">loading…</pre>
      </section>
    </main>
    <script src="/assets/app.js" defer></script>
  </body>
</html>
