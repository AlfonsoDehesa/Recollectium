name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run pyright

      - name: Test
        run: uv run pytest --cov=src/recollectium --cov-report=term-missing

  install-smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            shell: bash
          - name: linux-arm64
            os: ubuntu-24.04-arm
            shell: bash
          - name: macos-intel
            os: macos-14
            shell: bash
          - name: macos-apple-silicon
            os: macos-15
            shell: bash
          - name: windows-x86_64
            os: windows-latest
            shell: pwsh
          - name: windows-arm64
            os: windows-11-arm
            shell: pwsh
    name: install-smoke (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Recollectium on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: sh ./install.sh
        env:
          RECOLLECTIUM_INSTALL_REF: ${{ github.head_ref || github.ref_name }}

      - name: Install Recollectium on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\install.ps1
        env:
          RECOLLECTIUM_INSTALL_REF: ${{ github.head_ref || github.ref_name }}

      - name: Verify Recollectium on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          recollectium --version
          recollectium upgrade --check --install-method bootstrap --repo "$GITHUB_REPOSITORY" > upgrade-check.json
          recollectium upgrade --dry-run --install-method bootstrap --repo "$GITHUB_REPOSITORY" > upgrade-dry-run.json
          python - <<'PY'
          import json
          from pathlib import Path
          for path in ["upgrade-check.json", "upgrade-dry-run.json"]:
              payload = json.loads(Path(path).read_text())
              assert payload["status"] in {"up_to_date", "dry_run"}, payload
              assert payload["install_method"] == "bootstrap", payload
          PY

      - name: Verify Recollectium on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          recollectium --version
          recollectium upgrade --check --install-method bootstrap --repo "$env:GITHUB_REPOSITORY" | Out-File -Encoding utf8 upgrade-check.json
          recollectium upgrade --dry-run --install-method bootstrap --repo "$env:GITHUB_REPOSITORY" | Out-File -Encoding utf8 upgrade-dry-run.json
          python -c "import json, pathlib; payloads=[json.loads(pathlib.Path(p).read_text(encoding='utf-8-sig')) for p in ['upgrade-check.json','upgrade-dry-run.json']]; assert all(p['status'] in {'up_to_date', 'dry_run'} for p in payloads), payloads; assert all(p['install_method'] == 'bootstrap' for p in payloads), payloads"
