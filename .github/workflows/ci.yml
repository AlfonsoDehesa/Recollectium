name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run pyright

      - name: Test
        run: uv run pytest --cov=src/recollectium --cov-report=term-missing

  install-smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            shell: bash
          - name: linux-arm64
            os: ubuntu-24.04-arm
            shell: bash
          - name: macos-intel
            os: macos-14
            shell: bash
          - name: macos-apple-silicon
            os: macos-15
            shell: bash
          - name: windows-x86_64
            os: windows-latest
            shell: pwsh
          - name: windows-arm64
            os: windows-11-arm
            shell: pwsh
    name: install-smoke (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Recollectium on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "macOS" ]; then
            if [ "${{ matrix.name }}" = "macos-apple-silicon" ]; then
              export XDG_STATE_HOME="$RUNNER_TEMP/recollectium-xdg-state"
            fi
            tool_bin="$(uv tool dir --bin)"
            if [ "${{ matrix.name }}" = "macos-apple-silicon" ]; then
              export PATH="$tool_bin:$PATH"
            else
              export PATH="$(TOOL_BIN="$tool_bin" python3 - <<'PY'
          import os

          tool_bin = os.environ["TOOL_BIN"]
          print(":".join(part for part in os.environ["PATH"].split(":") if part != tool_bin))
          PY
          )"
            fi
          fi
          sh ./install.sh
        env:
          RECOLLECTIUM_INSTALL_REF: ${{ github.head_ref || github.ref_name }}
          SHELL: ${{ runner.os == 'macOS' && '/bin/zsh' || '' }}

      - name: Verify macOS zsh PATH bootstrap
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.name }}" = "macos-apple-silicon" ]; then
            export XDG_STATE_HOME="$RUNNER_TEMP/recollectium-xdg-state"
          fi
          expected_tool_bin="$(uv tool dir --bin)"
          if [ "${{ matrix.name }}" = "macos-apple-silicon" ]; then
            export PATH="$expected_tool_bin:$PATH"
          fi
          command_path="$(zsh -lc 'command -v recollectium')"
          test "$command_path" = "$expected_tool_bin/recollectium"
          zsh -lc 'recollectium --version'
          EXPECTED_TOOL_BIN="$expected_tool_bin" python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path
          try:
              from platformdirs.macos import MacOS
          except ModuleNotFoundError:
              MacOS = None

          def install_metadata_path() -> Path:
              if os.environ.get("RUNNER_OS") == "macOS":
                  xdg_state = os.environ.get("XDG_STATE_HOME")
                  if xdg_state:
                      return Path(xdg_state) / "recollectium" / "install.json"
                  if MacOS is not None:
                      return Path(MacOS("recollectium").user_state_dir) / "install.json"
                  return Path.home() / "Library" / "Application Support" / "recollectium" / "install.json"
              return Path.home() / ".local" / "state" / "recollectium" / "install.json"

          metadata_path = install_metadata_path()
          metadata = json.loads(metadata_path.read_text(encoding="utf-8"))
          tracking_target = metadata.get("tracking_target", {})
          assert tracking_target.get("selector"), metadata
          selector = tracking_target.get("selector")
          if selector == "main":
              expected_kind = "main"
          elif isinstance(selector, str) and re.fullmatch(r"v?[0-9]+([.][0-9A-Za-z.+!-]+)*", selector):
              expected_kind = "release"
          else:
              expected_kind = "custom_ref"
          assert tracking_target.get("kind") == expected_kind, metadata
          expected_path_edits = {
              str(Path.home() / ".zprofile"),
              str(Path.home() / ".zshrc"),
          }
          managed_path_edits = set(metadata.get("managed_path_edits", []))
          if os.environ.get("XDG_STATE_HOME"):
              assert managed_path_edits == set(), metadata
          else:
              assert expected_path_edits.issubset(managed_path_edits), metadata
              for path_text in expected_path_edits:
                  content = Path(path_text).read_text(encoding="utf-8")
                  assert "# >>> recollectium path >>>" in content, content
                  assert f'export PATH="{os.environ["EXPECTED_TOOL_BIN"]}:$PATH"' in content, content
                  assert "# <<< recollectium path <<<" in content, content
          PY

      - name: Install Recollectium on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\install.ps1
        env:
          RECOLLECTIUM_INSTALL_REF: ${{ github.head_ref || github.ref_name }}

      - name: Verify Recollectium on Unix
        if: runner.os != 'Windows'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ "$RUNNER_OS" = "macOS" ] && [ "${{ matrix.name }}" = "macos-apple-silicon" ]; then
            export XDG_STATE_HOME="$RUNNER_TEMP/recollectium-xdg-state"
          fi
          export PATH="$(uv tool dir --bin):$PATH"
          recollectium --version
          recollectium upgrade --check --install-method bootstrap --repo "$GITHUB_REPOSITORY" --json > upgrade-check.json
          recollectium upgrade --dry-run --install-method bootstrap --repo "$GITHUB_REPOSITORY" --json > upgrade-dry-run.json
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path
          try:
              from platformdirs.macos import MacOS
          except ModuleNotFoundError:
              MacOS = None
          for path in ["upgrade-check.json", "upgrade-dry-run.json"]:
              payload = json.loads(Path(path).read_text())
              assert payload["status"] in {"up_to_date", "dry_run"}, payload
              assert payload["install_method"] == "bootstrap", payload
          if os.environ.get("RUNNER_OS") == "macOS":
              xdg_state = os.environ.get("XDG_STATE_HOME")
              if xdg_state:
                  metadata_path = Path(xdg_state) / "recollectium" / "install.json"
              elif MacOS is not None:
                  metadata_path = Path(MacOS("recollectium").user_state_dir) / "install.json"
              else:
                  metadata_path = Path.home() / "Library" / "Application Support" / "recollectium" / "install.json"
          else:
              metadata_path = Path.home() / ".local" / "state" / "recollectium" / "install.json"
          metadata = json.loads(metadata_path.read_text(encoding="utf-8"))
          tracking_target = metadata.get("tracking_target", {})
          assert tracking_target.get("selector"), metadata
          selector = tracking_target.get("selector")
          if selector == "main":
              expected_kind = "main"
          elif isinstance(selector, str) and re.fullmatch(r"v?[0-9]+([.][0-9A-Za-z.+!-]+)*", selector):
              expected_kind = "release"
          else:
              expected_kind = "custom_ref"
          assert tracking_target.get("kind") == expected_kind, metadata
          PY

      - name: Verify service lifecycle on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "macOS" ] && [ "${{ matrix.name }}" = "macos-apple-silicon" ]; then
            export XDG_STATE_HOME="$RUNNER_TEMP/recollectium-xdg-state"
          fi
          export PATH="$(uv tool dir --bin):$PATH"
          smoke_root="$(mktemp -d)"
          trap 'recollectium --config "$smoke_root/config/config.json" service stop --json >/dev/null 2>&1 || true; rm -rf "$smoke_root"' EXIT
          port="$(python - <<'PY'
          import socket
          with socket.socket() as sock:
              sock.bind(("127.0.0.1", 0))
              print(sock.getsockname()[1])
          PY
          )"
          config="$smoke_root/config/config.json"
          recollectium --config "$config" config set service.port "$port" --json >/dev/null
          recollectium --config "$config" config set directories.data "$smoke_root/data" --json >/dev/null
          recollectium --config "$config" config set directories.cache "$smoke_root/cache" --json >/dev/null
          recollectium --config "$config" config set directories.logs "$smoke_root/logs" --json >/dev/null
          recollectium --config "$config" config set directories.runtime "$smoke_root/run" --json >/dev/null
          recollectium --config "$config" service start api --json > service-start.json
          python - "$port" <<'PY'
          import json
          import sys
          import time
          import urllib.request

          port = int(sys.argv[1])
          url = f"http://127.0.0.1:{port}/v1/health"
          deadline = time.monotonic() + 30
          last_error = None
          while time.monotonic() < deadline:
              try:
                  with urllib.request.urlopen(url, timeout=2) as response:
                      payload = json.loads(response.read().decode("utf-8"))
                  assert payload["data"]["status"] == "ok", payload
                  break
              except Exception as exc:  # smoke retry captures transient startup failures
                  last_error = exc
                  time.sleep(1)
          else:
              raise AssertionError(f"health check did not become ok: {last_error!r}")
          PY
          recollectium --config "$config" service status --json > service-status.json
          recollectium --config "$config" service discover --json > service-discover.json
          recollectium --verbose --config "$config" service status --json > service-status-verbose.json
          recollectium --verbose --config "$config" service discover --json > service-discover-verbose.json
          python - <<'PY'
          import json
          import urllib.request
          from pathlib import Path

          def assert_http_json(url: str) -> dict:
              with urllib.request.urlopen(url, timeout=5) as response:
                  assert response.status == 200, (url, response.status)
                  return json.loads(response.read().decode("utf-8"))

          start_payload = json.loads(Path("service-start.json").read_text(encoding="utf-8"))
          assert start_payload["status"] == "started", start_payload
          assert start_payload["type"] == "api", start_payload
          assert start_payload["pid"] > 0, start_payload

          status_payload = json.loads(Path("service-status.json").read_text(encoding="utf-8"))
          assert set(status_payload) == {"running", "type", "endpoint", "pid"}, status_payload
          assert status_payload["running"] is True, status_payload
          assert status_payload["type"] == "api", status_payload
          assert status_payload["pid"] > 0, status_payload
          assert status_payload["endpoint"].startswith("http://"), status_payload

          discover_payload = json.loads(Path("service-discover.json").read_text(encoding="utf-8"))
          assert set(discover_payload) == {
              "status",
              "type",
              "endpoint",
              "pid",
              "health_url",
              "version_url",
              "capabilities_url",
          }, discover_payload
          assert discover_payload["status"] == "running", discover_payload
          assert discover_payload["type"] == "api", discover_payload
          assert discover_payload["pid"] > 0, discover_payload
          for key in ("endpoint", "health_url", "version_url", "capabilities_url"):
              value = discover_payload.get(key)
              assert isinstance(value, str) and value.startswith("http://"), discover_payload
          for omitted_key in ("service", "versions", "paths"):
              assert omitted_key not in discover_payload, discover_payload
              assert omitted_key not in status_payload, status_payload

          verbose_status = json.loads(Path("service-status-verbose.json").read_text(encoding="utf-8"))
          verbose_discover = json.loads(Path("service-discover-verbose.json").read_text(encoding="utf-8"))
          for verbose_payload in (verbose_status, verbose_discover):
              assert verbose_payload["status"] == "running", verbose_payload
              assert isinstance(verbose_payload["service"], dict), verbose_payload
              assert verbose_payload["service"]["type"] == "api", verbose_payload
              assert verbose_payload["service"]["pid"] > 0, verbose_payload
              assert verbose_payload["service"]["endpoint"] == discover_payload["endpoint"], verbose_payload
              assert verbose_payload["service"]["api_prefix"] == "/v1", verbose_payload
              assert isinstance(verbose_payload["versions"], dict), verbose_payload
              assert verbose_payload["versions"]["service_api_version"] == "1", verbose_payload
              assert isinstance(verbose_payload["versions"]["recollectium_version"], str), verbose_payload
              assert isinstance(verbose_payload["paths"], dict), verbose_payload

          health = assert_http_json(discover_payload["health_url"])
          assert health["data"]["status"] == "ok", health
          version = assert_http_json(discover_payload["version_url"])
          assert version["data"]["service_api_version"] == "1", version
          assert isinstance(version["data"]["recollectium_version"], str), version
          capabilities = assert_http_json(discover_payload["capabilities_url"])
          assert capabilities["data"]["service_api_version"] == "1", capabilities
          assert isinstance(capabilities["data"]["capabilities"], list), capabilities
          assert "health.read" in capabilities["data"]["capabilities"], capabilities
          PY
          recollectium --config "$config" service stop --json > service-stop.json
          recollectium --config "$config" service status --json > service-stopped.json
          python - <<'PY'
          import json
          from pathlib import Path

          stop_payload = json.loads(Path("service-stop.json").read_text(encoding="utf-8"))
          assert stop_payload["status"] == "stopped", stop_payload
          stopped_payload = json.loads(Path("service-stopped.json").read_text(encoding="utf-8"))
          assert stopped_payload["running"] is False, stopped_payload
          PY

      - name: Verify uninstall on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "macOS" ] && [ "${{ matrix.name }}" = "macos-apple-silicon" ]; then
            export XDG_STATE_HOME="$RUNNER_TEMP/recollectium-xdg-state"
          fi
          export PATH="$(uv tool dir --bin):$PATH"

          python - <<'PY'
          import json
          import os
          from pathlib import Path
          try:
              from platformdirs.macos import MacOS
          except ModuleNotFoundError:
              MacOS = None

          if os.environ.get("RUNNER_OS") == "macOS":
              xdg_state = os.environ.get("XDG_STATE_HOME")
              if xdg_state:
                  metadata_path = Path(xdg_state) / "recollectium" / "install.json"
              elif MacOS is not None:
                  metadata_path = Path(MacOS("recollectium").user_state_dir) / "install.json"
              else:
                  metadata_path = Path.home() / "Library" / "Application Support" / "recollectium" / "install.json"
          else:
              metadata_path = Path.home() / ".local" / "state" / "recollectium" / "install.json"
          metadata = json.loads(metadata_path.read_text(encoding="utf-8"))
          completion_targets = []
          for item in metadata.get("managed_completion_edits", []):
              if not isinstance(item, dict):
                  continue
              path = item.get("path")
              if isinstance(path, str) and path:
                  completion_targets.append(path)
          if not completion_targets:
              for item in metadata.get("managed_path_edits", []):
                  if not isinstance(item, str) or "completion --source" not in item:
                      continue
                  path, _, _command = item.partition(": ")
                  if path:
                      completion_targets.append(path)
          assert completion_targets, metadata
          for path_text in completion_targets:
              path = Path(path_text)
              content = path.read_text(encoding="utf-8")
              assert "# >>> recollectium completion >>>" in content, content
          Path("completion-targets.json").write_text(json.dumps(completion_targets), encoding="utf-8")
          PY

          recollectium add --space user --type note --content "CI uninstall smoke sentinel" --json > add-default.json
          recollectium --verbose uninstall --json > uninstall-default.json 2> uninstall-default.stderr

          python - <<'PY'
          import json
          from pathlib import Path

          add_payload = json.loads(Path("add-default.json").read_text(encoding="utf-8"))
          assert add_payload.get("id"), add_payload

          stderr = Path("uninstall-default.stderr").read_text(encoding="utf-8")
          assert stderr == "", stderr
          payload = json.loads(Path("uninstall-default.json").read_text(encoding="utf-8"))
          assert payload["status"] == "uninstalled", payload
          assert payload["package"]["install_method"] == "bootstrap", payload
          assert payload["package"]["recommended"] == "uv tool uninstall recollectium", payload
          assert payload["package"]["uninstall"]["status"] == "removed", payload
          assert payload["data"]["preserved"] is True, payload
          paths = payload["data"]["paths"]
          assert Path(paths["config"]).exists(), paths
          assert Path(paths["database"]).exists(), paths

          completion_targets = json.loads(Path("completion-targets.json").read_text(encoding="utf-8"))
          for path_text in completion_targets:
              content = Path(path_text).read_text(encoding="utf-8")
              assert "# >>> recollectium completion >>>" not in content, content
          removed = payload["shell_completion"]["removed"]
          assert any(item.get("removed") is True and item.get("blocks", 0) >= 1 for item in removed), payload
          PY

          hash -r
          if command -v recollectium >/dev/null 2>&1; then
            echo "recollectium command still exists after default uninstall" >&2
            command -v recollectium >&2 || true
            exit 1
          fi

          if [ "$RUNNER_OS" = "macOS" ] && [ "${{ matrix.name }}" = "macos-apple-silicon" ]; then
            export XDG_STATE_HOME="$RUNNER_TEMP/recollectium-xdg-state"
          fi
          RECOLLECTIUM_INSTALL_REF="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}" sh ./install.sh
          export PATH="$(uv tool dir --bin):$PATH"
          hash -r
          recollectium init
          recollectium add --space user --type note --content "CI purge uninstall smoke sentinel" --json > add-purge.json
          recollectium --verbose uninstall --purge --yes-delete-all-recollectium-data --json > uninstall-purge.json 2> uninstall-purge.stderr

          python - <<'PY'
          import json
          from pathlib import Path

          add_payload = json.loads(Path("add-purge.json").read_text(encoding="utf-8"))
          assert add_payload.get("id"), add_payload

          payload = json.loads(Path("uninstall-purge.json").read_text(encoding="utf-8"))
          purge_stderr = Path("uninstall-purge.stderr").read_text(encoding="utf-8")
          assert purge_stderr == "", purge_stderr
          assert payload["status"] == "uninstalled", payload
          assert payload["package"]["install_method"] == "bootstrap", payload
          assert payload["package"]["recommended"] == "uv tool uninstall recollectium", payload
          assert payload["package"]["uninstall"]["status"] == "removed", payload
          assert payload["data"]["preserved"] is False, payload
          purge = payload["data"]["purge"]
          assert purge["dry_run"] is False, payload
          assert purge["deleted"], payload
          paths = payload["data"]["paths"]
          assert not Path(paths["config"]).exists(), paths
          assert not Path(paths["database"]).exists(), paths
          PY

          hash -r
          if command -v recollectium >/dev/null 2>&1; then
            echo "recollectium command still exists after purge uninstall" >&2
            command -v recollectium >&2 || true
            exit 1
          fi

      - name: Verify Recollectium on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          recollectium --version
          recollectium upgrade --check --install-method bootstrap --repo "$env:GITHUB_REPOSITORY" --json | Out-File -Encoding utf8 upgrade-check.json
          recollectium upgrade --dry-run --install-method bootstrap --repo "$env:GITHUB_REPOSITORY" --json | Out-File -Encoding utf8 upgrade-dry-run.json
          python -c "import json, pathlib; payloads=[json.loads(pathlib.Path(p).read_text(encoding='utf-8-sig')) for p in ['upgrade-check.json','upgrade-dry-run.json']]; assert all(p['status'] in {'up_to_date', 'dry_run'} for p in payloads), payloads; assert all(p['install_method'] == 'bootstrap' for p in payloads), payloads"
          python -c "import json, os, pathlib, re; metadata_path=pathlib.Path(os.environ['LOCALAPPDATA']) / 'recollectium' / 'install.json'; metadata=json.loads(metadata_path.read_text(encoding='utf-8-sig')); target=metadata.get('tracking_target', {}); selector=target.get('selector'); assert selector, metadata; expected='main' if selector == 'main' else 'release' if isinstance(selector, str) and re.fullmatch(r'v?[0-9]+([.][0-9A-Za-z.+!-]+)*', selector) else 'custom_ref'; assert target.get('kind') == expected, metadata"

      - name: Verify service lifecycle on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $smokeRoot = Join-Path ([System.IO.Path]::GetTempPath()) ("recollectium-smoke-" + [System.Guid]::NewGuid().ToString("N"))
          New-Item -ItemType Directory -Force -Path $smokeRoot | Out-Null
          $config = Join-Path $smokeRoot "config\config.json"
          try {
            $port = python -c "import socket; s=socket.socket(); s.bind(('127.0.0.1', 0)); print(s.getsockname()[1]); s.close()"
            recollectium --config $config config set service.port $port --json | Out-Null
            recollectium --config $config config set directories.data (Join-Path $smokeRoot "data") --json | Out-Null
            recollectium --config $config config set directories.cache (Join-Path $smokeRoot "cache") --json | Out-Null
            recollectium --config $config config set directories.logs (Join-Path $smokeRoot "logs") --json | Out-Null
            recollectium --config $config config set directories.runtime (Join-Path $smokeRoot "run") --json | Out-Null
            recollectium --config $config service start api --json | Out-File -Encoding utf8 service-start.json
            python -c "import json, sys, time, urllib.request`nport=int(sys.argv[1]); url=f'http://127.0.0.1:{port}/v1/health'; deadline=time.monotonic()+30; last=None`nwhile time.monotonic() < deadline:`n    try:`n        payload=json.loads(urllib.request.urlopen(url, timeout=2).read().decode('utf-8'))`n        assert payload['data']['status'] == 'ok', payload`n        break`n    except Exception as exc:`n        last=exc; time.sleep(1)`nelse:`n    raise AssertionError(f'health check did not become ok: {last!r}')" $port
            recollectium --config $config service status --json | Out-File -Encoding utf8 service-status.json
            recollectium --config $config service discover --json | Out-File -Encoding utf8 service-discover.json
            recollectium --verbose --config $config service status --json | Out-File -Encoding utf8 service-status-verbose.json
            recollectium --verbose --config $config service discover --json | Out-File -Encoding utf8 service-discover-verbose.json
            python -c "import json, pathlib, urllib.request`ndef load(p): return json.loads(pathlib.Path(p).read_text(encoding='utf-8-sig'))`ndef get(url):`n    response=urllib.request.urlopen(url, timeout=5); assert response.status == 200, (url, response.status); return json.loads(response.read().decode('utf-8'))`nstart=load('service-start.json'); assert start['status'] == 'started', start; assert start['type'] == 'api', start; assert start['pid'] > 0, start`nstatus=load('service-status.json'); assert set(status) == {'running','type','endpoint','pid'}, status; assert status['running'] is True, status; assert status['type'] == 'api', status; assert status['pid'] > 0, status; assert status['endpoint'].startswith('http://'), status`ndiscover=load('service-discover.json'); assert set(discover) == {'status','type','endpoint','pid','health_url','version_url','capabilities_url'}, discover; assert discover['status'] == 'running', discover; assert discover['type'] == 'api', discover; assert discover['pid'] > 0, discover; [(_ for _ in ()).throw(AssertionError(discover)) for key in ('endpoint','health_url','version_url','capabilities_url') if not (isinstance(discover.get(key), str) and discover[key].startswith('http://'))]; [(_ for _ in ()).throw(AssertionError((status, discover))) for key in ('service','versions','paths') if key in status or key in discover]`nverbose_status=load('service-status-verbose.json'); verbose_discover=load('service-discover-verbose.json')`nfor payload in (verbose_status, verbose_discover):`n    assert payload['status'] == 'running', payload; assert isinstance(payload['service'], dict), payload; assert payload['service']['type'] == 'api', payload; assert payload['service']['pid'] > 0, payload; assert payload['service']['endpoint'] == discover['endpoint'], payload; assert payload['service']['api_prefix'] == '/v1', payload; assert payload['versions']['service_api_version'] == '1', payload; assert isinstance(payload['versions']['recollectium_version'], str), payload; assert isinstance(payload['paths'], dict), payload`nhealth=get(discover['health_url']); assert health['data']['status'] == 'ok', health`nversion=get(discover['version_url']); assert version['data']['service_api_version'] == '1', version; assert isinstance(version['data']['recollectium_version'], str), version`ncapabilities=get(discover['capabilities_url']); assert capabilities['data']['service_api_version'] == '1', capabilities; assert isinstance(capabilities['data']['capabilities'], list), capabilities; assert 'health.read' in capabilities['data']['capabilities'], capabilities"
            recollectium --config $config service stop --json | Out-File -Encoding utf8 service-stop.json
            recollectium --config $config service status --json | Out-File -Encoding utf8 service-stopped.json
            python -c "import json, pathlib; stop=json.loads(pathlib.Path('service-stop.json').read_text(encoding='utf-8-sig')); assert stop['status'] == 'stopped', stop; stopped=json.loads(pathlib.Path('service-stopped.json').read_text(encoding='utf-8-sig')); assert stopped['running'] is False, stopped"
          }
          finally {
            recollectium --config $config service stop --json *> $null
            Remove-Item -Recurse -Force $smokeRoot -ErrorAction SilentlyContinue
          }

      - name: Verify uninstall on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          function Invoke-RecollectiumSmokeCommand {
            param(
              [string[]]$Arguments,
              [string]$StdoutPath,
              [string]$StderrPath
            )
            & recollectium @Arguments > $StdoutPath 2> $StderrPath
            if ($LASTEXITCODE -ne 0) {
              if (Test-Path $StdoutPath) { Get-Content $StdoutPath }
              if (Test-Path $StderrPath) { Get-Content $StderrPath }
              throw "recollectium $($Arguments -join ' ') failed with exit code $LASTEXITCODE"
            }
          }

          function Invoke-PythonSmokeCheck {
            param([string]$Command)
            python -c $Command
            if ($LASTEXITCODE -ne 0) {
              throw "python smoke assertion failed with exit code $LASTEXITCODE"
            }
          }

          Invoke-RecollectiumSmokeCommand -Arguments @("add", "--space", "user", "--type", "note", "--content", "CI uninstall smoke sentinel", "--json") -StdoutPath add-default.json -StderrPath add-default.stderr
          Invoke-RecollectiumSmokeCommand -Arguments @("--verbose", "uninstall", "--json") -StdoutPath uninstall-default.json -StderrPath uninstall-default.stderr

          Invoke-PythonSmokeCheck -Command "import json, pathlib; add=json.loads(pathlib.Path('add-default.json').read_text(encoding='utf-8-sig')); assert add.get('id'), add; stderr=pathlib.Path('uninstall-default.stderr').read_text(encoding='utf-8-sig'); assert stderr == '', stderr; payload=json.loads(pathlib.Path('uninstall-default.json').read_text(encoding='utf-8-sig')); assert payload['status'] == 'uninstalled', payload; assert payload['package']['install_method'] == 'bootstrap', payload; assert payload['package']['recommended'] == 'uv tool uninstall recollectium', payload; uninstall=payload['package']['uninstall']; assert uninstall['status'] == 'scheduled', payload; assert uninstall['argv'][-3:] == ['tool', 'uninstall', 'recollectium'], payload; assert isinstance(uninstall['helper_pid'], int) and uninstall['helper_pid'] > 0, payload; assert 'handed off' in uninstall['hint'], payload; assert payload['data']['preserved'] is True, payload; paths=payload['data']['paths']; assert pathlib.Path(paths['config']).exists(), paths; assert pathlib.Path(paths['database']).exists(), paths"
          Start-Sleep -Seconds 5

          $uv = (Get-Command uv -ErrorAction SilentlyContinue).Source
          if (-not $uv) { $uv = Join-Path $env:LOCALAPPDATA "uv\uv.exe" }

          $env:RECOLLECTIUM_INSTALL_REF = if ($env:GITHUB_HEAD_REF) { $env:GITHUB_HEAD_REF } else { $env:GITHUB_REF_NAME }
          .\install.ps1
          if ($LASTEXITCODE -ne 0) { throw "install.ps1 failed with exit code $LASTEXITCODE" }

          Invoke-RecollectiumSmokeCommand -Arguments @("init") -StdoutPath init-purge.json -StderrPath init-purge.stderr
          Invoke-PythonSmokeCheck -Command "import pathlib; assert pathlib.Path('init-purge.stderr').read_text(encoding='utf-8-sig') == ''"
          Invoke-RecollectiumSmokeCommand -Arguments @("add", "--space", "user", "--type", "note", "--content", "CI purge uninstall smoke sentinel", "--json") -StdoutPath add-purge.json -StderrPath add-purge.stderr
          Invoke-RecollectiumSmokeCommand -Arguments @("--verbose", "uninstall", "--purge", "--yes-delete-all-recollectium-data", "--json") -StdoutPath uninstall-purge.json -StderrPath uninstall-purge.stderr

          Invoke-PythonSmokeCheck -Command "import json, pathlib; add=json.loads(pathlib.Path('add-purge.json').read_text(encoding='utf-8-sig')); assert add.get('id'), add; purge_stderr=pathlib.Path('uninstall-purge.stderr').read_text(encoding='utf-8-sig'); assert purge_stderr == '', purge_stderr; payload=json.loads(pathlib.Path('uninstall-purge.json').read_text(encoding='utf-8-sig')); assert payload['status'] == 'uninstalled', payload; assert payload['package']['install_method'] == 'bootstrap', payload; assert payload['package']['recommended'] == 'uv tool uninstall recollectium', payload; uninstall=payload['package']['uninstall']; assert uninstall['status'] == 'scheduled', payload; assert uninstall['argv'][-3:] == ['tool', 'uninstall', 'recollectium'], payload; assert isinstance(uninstall['helper_pid'], int) and uninstall['helper_pid'] > 0, payload; assert 'handed off' in uninstall['hint'], payload; assert payload['data']['preserved'] is False, payload; purge=payload['data']['purge']; assert purge['dry_run'] is False, payload; assert purge['deleted'], payload; paths=payload['data']['paths']; assert not pathlib.Path(paths['config']).exists(), paths; assert not pathlib.Path(paths['database']).exists(), paths"
