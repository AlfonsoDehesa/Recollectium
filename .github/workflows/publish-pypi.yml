name: Publish PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    environment: pypi
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          case "$tag" in
            v*) ;;
            *)
              echo "Release tag must start with v" >&2
              exit 1
              ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.release_tag.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv==0.11.15

      - name: Verify version matches tag
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import sys
          import tomllib

          tag = "${{ steps.release_tag.outputs.tag }}"
          expected_version = tag.removeprefix("v")
          project_version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          if project_version != expected_version:
              print(
                  f"pyproject.toml version {project_version} does not match tag {tag}",
                  file=sys.stderr,
              )
              raise SystemExit(1)
          PY

      - name: Build distribution files
        run: uv build --sdist --wheel

      - name: Check distribution metadata
        run: uvx --from twine twine check dist/*

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always dist/*
